name: Update Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  update-svg:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Add this to grant write access
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Update Progress SVG
        env:
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: python update_stats.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add progress.svg
          git commit -m "chore: dynamically update progress stats" || echo "No changes to commit"
          git push origin HEAD:main  # Specify branch explicitly
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Add this for authentication
